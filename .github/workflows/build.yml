name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    env:
      UV_PYTHON: '3.12'
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Check formatting
        run: uv run --locked --group dev ruff format --check .

      - name: Lint
        run: uv run --locked --group dev ruff check .

      - name: Type check with ty
        run: uv run --locked --group dev ty check .

      - name: Type check with mypy
        run: uv run --locked --group dev mypy .

      - name: Build with Nuitka
        run: uv run --locked --group build python scripts/build_nuitka.py --clean --dmg --appimage

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}
          path: dist/**
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download Artifacts (Ubuntu)
        uses: actions/download-artifact@v4
        with:
          name: ubuntu-latest
          path: ubuntu

      - name: Download Artifacts (Windows)
        uses: actions/download-artifact@v4
        with:
          name: windows-latest
          path: windows

      - name: Download Artifacts (macOS)
        uses: actions/download-artifact@v4
        with:
          name: macos-latest
          path: macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ubuntu/CANViewer-*.AppImage
            windows/CANViewer.exe
            macos/CANViewer.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
